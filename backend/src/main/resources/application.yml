spring:
  application:
    name: jarvis-backend
  profiles:
    # Inference provider profile. 'local' = Ollama (default, ₹0).
    # 'cloud' / 'hybrid' added later without touching business code (see plan §Model portability).
    active: ${JARVIS_PROFILE:local}
  datasource:
    url: ${JDBC_URL:jdbc:postgresql://localhost:5432/jarvis}
    username: ${DB_USER:jarvis}
    password: ${DB_PASSWORD:jarvis}
  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never auto-generated
    open-in-view: false
    properties:
      hibernate.format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

# Application-level config (externalised so model choices are config, not code)
jarvis:
  ai:
    parser-model: ${JARVIS_PARSER_MODEL:qwen3.5:9b}
    agent-model: ${JARVIS_AGENT_MODEL:qwen3.5:27b}
  security:
    # Single-user MVP. The user is seeded into app_user (BCrypt) on first start.
    username: ${JARVIS_USER:jarvis}
    password: ${JARVIS_PASSWORD:jarvis}
    # JWT (HS256). Secret must be >= 32 bytes. Override in .env.
    jwt-secret: ${JARVIS_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum!!}
    jwt-ttl-minutes: ${JARVIS_JWT_TTL_MINUTES:1440}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.jarvis.backend: DEBUG

---
# ===== local profile: Ollama (default) =====
spring:
  config:
    activate:
      on-profile: local
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      init:
        pull-model-strategy: never   # we manage `ollama pull` ourselves
      chat:
        options:
          model: ${JARVIS_AGENT_MODEL:qwen3.5:27b}
          temperature: 0.1
