server:
  port: 8082

spring:
  application:
    name: expense-service
  datasource:
    url: ${JARVIS_DB_URL:jdbc:postgresql://localhost:5432/jarvis}
    username: ${DB_USER:jarvis}
    password: ${DB_PASSWORD:jarvis}
  jpa:
    hibernate:
      ddl-auto: validate          # schema owned by Flyway
    open-in-view: false
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:expense}
  flyway:
    enabled: true
    # Each service owns a private schema inside the shared jarvis DB (created if absent).
    schemas: ${DB_SCHEMA:expense}
    default-schema: ${DB_SCHEMA:expense}

jarvis:
  security:
    jwt-secret: ${JARVIS_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum!!}
    jwt-ttl-minutes: ${JARVIS_JWT_TTL_MINUTES:1440}
    # Service-to-service endpoints bypass user JWT and use the internal key instead.
    public-paths: /internal/**
  internal:
    key: ${JARVIS_INTERNAL_KEY:dev-internal-key-change-me}
  cors:
    allowed-origins: ${JARVIS_CORS_ORIGINS:http://localhost:5173}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.jarvis: DEBUG
